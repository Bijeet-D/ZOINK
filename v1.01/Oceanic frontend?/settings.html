    <style>
        :root {
            --buttonBg: rgba(8, 23, 181, 0.703);
            --mainBg: rgba(0, 217, 255, 0);
            --innerSectionBg: rgba(255, 255, 255, 0.441);
            --innetSectionFil: blur(10px);
        }

        .main-settings {
            width: 65vw;
            background-color: var(--mainBg);
        }

        .setting-section-cloak {
            display: flex;
            flex-shrink: 0;   /* prevents shrinking */
            flex-grow: 0;     /* prevents growing */
            flex-direction: column;
            align-items: center;
            background-color: var(--innerSectionBg);
            backdrop-filter: var(--innetSectionFil);
            width: 90%;
            height: fit-content;
            border-radius: 30px;
            padding: 30px;
        }

        .center-content {
            display: flex;
            justify-content: center;
        }
        /*
        -----------------------------------
        -- +++ ==TAB CLOAK STYLING== +++ -- 
        -----------------------------------
        */

        .presets-cloak {
            display: flex;

            button {
                background-color: var(--buttonBg);
                color: aliceblue;
                border: none;
                cursor: pointer;
                width: 10rem;
                height: 2rem;
                margin: 10px;
            }

        }

    </style>
